credentials:
  ####################################################################
  # COPERNICUS S3 (PRIMARY SOURCE FOR SENTINEL-1/2 + DEM)
  ####################################################################
  copernicus_s3:
    enabled: true
    provider: "copernicus_dataspace"
    endpoint_url: "https://eodata.dataspace.copernicus.eu"
    region_name: "default"
    access_key: "F2LSZGDY500DWOJ22Q3P"
    secret_key: "nj4HuXRHgpmTDKuiZPPfFNAnrIAsuL0nYGGQ2ZBk"
    use_ssl: true
    verify_ssl: true
    use_anonymous: false
    multipart_download: true
    token_cache: true
    timeout_seconds: 300
    retry_attempts: 8
    max_connections: 100


  ####################################################################
  # COPERNICUS CDS (ERA5 / CLIMATE PRODUCTS)
  ####################################################################
  cds:
    enabled: true
    provider: "copernicus_cds"
    url: "https://cds.climate.copernicus.eu/api"
    api_key: "db09c00b-2041-4c96-9b77-87465e39c409"
    timeout_seconds: 300
    retry_attempts: 8


  ####################################################################
  # GOOGLE EARTH ENGINE
  ####################################################################
  earth_engine:
    enabled: true
    auth_type: "service_account"
    use_local_auth: true
    service_account_email: ""
    service_account_key_path: ""
    project_id: ""
    retry_attempts: 5


  ####################################################################
  # NASA EARTHDATA (ICESAT-2 / GRACE / MERRA-2)
  ####################################################################
  nasa_earthdata:
    enabled: true
    auth_type: "username_password"
    username: "himalayamandacse"
    password: "Fireflyon@2026"
    token_cache: true
    timeout_seconds: 300
    retry_attempts: 8


  ####################################################################
  # ASF (ALOS-2 PALSAR)
  ####################################################################
  asf:
    enabled: true
    auth_type: "username_password"
    username: "YOUR_ASF_USERNAME"
    password: "YOUR_ASF_PASSWORD"
    token_cache: true
    timeout_seconds: 300
    retry_attempts: 8


  ####################################################################
  # GLIMS (NO AUTH)
  ####################################################################
  glims:
    enabled: true
    auth_type: "none"

  ####################################################################
  # RANDOLPH GLACIER INVENTORY (NO AUTH)
  ####################################################################
  rgi:
    enabled: true
    auth_type: "none"